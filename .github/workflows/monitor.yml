name: FirstCry Hot Wheels Monitor

on:
  schedule:
    - cron: "0 */6 * * *"   # starts a fresh ~5h45m polling run every 6 hours
  workflow_dispatch: {}      # lets you click "Run workflow" manually to test

permissions:
  contents: write            # needed so the job can commit/push state updates

concurrency:
  group: firstcry-monitor
  cancel-in-progress: true   # if a new run starts, retire the old one cleanly

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 350      # hard stop just under GitHub's 6-hour job limit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python scraper.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Final safety commit
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_products.json
          git diff --quiet --cached || git commit -m "Update seen products"
          git push || true
